version: "2"

run:
  timeout: 5m

linters:
  enable:
    - misspell
    - whitespace
    - gocritic
    - bodyclose
    - noctx
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic

formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/your-org/rpc-mesh
